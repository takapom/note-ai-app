<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Native Note</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1d2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button {
        min-height: 2rem;
        border: 1px solid #b8c0cc;
        border-radius: 6px;
        background: #ffffff;
        color: #1d2430;
      }

      .ann-app-shell {
        display: grid;
        grid-template-columns: minmax(12rem, 16rem) minmax(0, 1fr);
        min-height: 100vh;
      }

      .ann-sidebar {
        border-right: 1px solid #d8dde5;
        background: #edf1f5;
        padding: 1rem;
      }

      .ann-note-surface {
        width: min(100%, 960px);
        padding: 1.5rem;
      }

      .ann-next-open-digest,
      .ann-block-editor {
        margin-top: 1rem;
      }

      .ann-block {
        display: grid;
        grid-template-columns: minmax(0, 1fr) max-content;
        gap: 0.375rem 0.75rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid #e1e5eb;
      }

      .ann-block-text {
        min-height: 1.75rem;
        line-height: 1.5;
        outline: none;
        overflow-wrap: anywhere;
      }

      .ann-block-text:focus {
        box-shadow: inset 0 -2px 0 #3f6f9f;
      }

      .ann-block-controls {
        min-width: 7rem;
        text-align: right;
      }

      .ann-block-status {
        grid-column: 1 / -1;
        min-height: 1.5rem;
        line-height: 1.5rem;
        overflow: hidden;
      }

      .ann-inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
      }
    </style>
  </head>
  <body>
    <!-- Deployment must provide data-api-base-url, data-workspace-id, and data-note-id. -->
    <main data-note-surface-root></main>
    <script type="module">
      import { startBrowserNoteSurfaceApp } from '/assets/apps/web/src/browserNoteSurfaceAppEntry.js';

      await startBrowserNoteSurfaceApp(
        {
          documentReadyState: () => document.readyState,
          addEventListener: globalThis.addEventListener.bind(globalThis),
        },
        {},
      );
    </script>
  </body>
</html>
